// LinkFlow React Native SDK — Android module gradle script.
// Consumed by RN autolinking. Integrating apps do NOT need to edit their
// own settings.gradle or build.gradle.

buildscript {
  ext.getExtOrDefault = { name ->
    return rootProject.ext.has(name)
      ? rootProject.ext.get(name)
      : project.properties['LinkFlowSDK_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:7.4.2"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion') ?: '1.8.10'}"
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace 'com.linkflow.sdk'

  compileSdkVersion safeExtGet('compileSdkVersion', 34)

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 21)
    targetSdkVersion safeExtGet('targetSdkVersion', 34)
    versionCode 1
    versionName "1.1.0"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_11
    targetCompatibility JavaVersion.VERSION_11
  }

  kotlinOptions {
    jvmTarget = '11'
  }

  sourceSets {
    main {
      java.srcDirs = ['src/main/java', 'src/main/kotlin']
    }
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable 'GradleCompatible'
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"

  implementation "org.jetbrains.kotlin:kotlin-stdlib:${safeExtGet('kotlinVersion', '1.8.10')}"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

  // Play Install Referrer (deferred deep link attribution on Android)
  implementation 'com.android.installreferrer:installreferrer:2.2'

  // Google Play Services Ads Identifier (GAID for deterministic attribution)
  implementation 'com.google.android.gms:play-services-ads-identifier:18.0.1'
}
