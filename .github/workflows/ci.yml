name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install
      - run: npm run typecheck

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'  # trusted publishing requires Node 22.14.0+
          registry-url: https://registry.npmjs.org/

      - run: npm install

      - name: Build package
        run: npm run prepack

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public
        # No NODE_AUTH_TOKEN — npm CLI auto-detects OIDC from id-token and exchanges it
